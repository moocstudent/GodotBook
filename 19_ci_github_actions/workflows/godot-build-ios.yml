name: iOS Build

on:
  workflow_dispatch:
  push:
    tags: ['ios-v*']

env:
  GODOT_VERSION: 4.3
  GODOT_STATUS: stable
  PROJECT_PATH: 01_hello_world

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # —— Godot + 导出模板 ——
      - name: Setup Godot
        run: |
          set -euo pipefail
          curl -sL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_macos.universal.zip"
          unzip -q godot.zip
          sudo mv Godot.app /Applications/Godot.app
          curl -sL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          unzip -qo templates.tpz
          mv templates/* "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/"

      # —— 导入 .p12 证书到临时 keychain ——
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$P12_BASE64" | base64 -d > /tmp/cert.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -A
          security list-keychains -s "$KEYCHAIN" $(security list-keychains -d user | tr -d \")
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN"

      # —— provisioning profile ——
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_BASE64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/build.mobileprovision"

      # —— Godot 导 Xcode 工程 ——
      - name: Export iOS Xcode project
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          mkdir -p build
          /Applications/Godot.app/Contents/MacOS/Godot \
              --headless \
              --export-release "iOS" \
              "build/HelloAndroid.xcodeproj"

      # —— xcodebuild archive + 导 .ipa ——
      - name: Archive and export ipa
        working-directory: ${{ env.PROJECT_PATH }}/build
        run: |
          set -euo pipefail
          xcodebuild -project HelloAndroid.xcodeproj \
                     -scheme HelloAndroid \
                     -configuration Release \
                     -archivePath HelloAndroid.xcarchive \
                     -allowProvisioningUpdates \
                     archive

          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>stripSwiftSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
              -archivePath HelloAndroid.xcarchive \
              -exportPath . \
              -exportOptionsPlist ExportOptions.plist

      - name: Upload ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ env.PROJECT_PATH }}/build/*.ipa
          retention-days: 7
